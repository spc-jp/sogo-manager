<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS投稿マネージャー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fa; /* Google風の薄いグレー背景 */
  --panel: #ffffff;
  --card: #ffffff;
  --border: #dadce0; /* Google風の枠線カラー */
  --border-light: #f1f3f4;
  --cyan: #1a73e8; /* Google Blue */
  --blue: #1a73e8;
  --white: #202124; /* Googleの基本テキスト黒 */
  --muted: #5f6368; /* サブテキスト */
  --draft: #f4b400;
  --scheduled: #1a73e8;
  --posted: #34a853;
  --danger: #d93025;
  --shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
  --shadow-hover: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 1px 2px 0 rgba(60,64,67,0.1);
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: var(--white); cursor: pointer; transition: opacity 0.2s; }
.logo:hover { opacity: 0.8; }
.logo span { color: var(--cyan); }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4285f4, #1a73e8); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
.header-date { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

.tab-bar { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab { padding: 14px 20px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
.tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.tab:hover:not(.active) { color: var(--white); }

.view { display: none; padding: 20px 28px; width: 100%; max-width: 1200px; margin: 0 auto; }
.view.active { display: block; }

/* TODAY */
.today-hero {
  background: #e8f0fe;
  border: 1px solid #d2e3fc;
  border-radius: 8px;
  padding: 18px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.today-title { font-size: 18px; font-weight: 700; color: #1967d2; }
.today-sub { font-size: 12px; color: #1967d2; margin-top: 3px; opacity: 0.8; }
.today-count { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 700; color: #1967d2; text-align: right; }
.today-count span { font-size: 13px; font-family: 'Noto Sans JP', sans-serif; font-weight: 400; }

.today-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
  margin-bottom: 14px;
  transition: box-shadow 0.2s, border-color 0.2s;
  animation: fadeIn 0.25s ease;
}
.today-card:hover { box-shadow: var(--shadow-hover); border-color: var(--cyan); }
.today-card.is-done { opacity: 0.6; }

.card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

/* ★ 共通バッジスタイル（Google風ベタ塗り白文字） */
.pbadge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; border: none !important; color: #fff !important; box-shadow: none; }
.pbadge-X { background: #039be5 !important; }
.pbadge-Threads { background: #616161 !important; }
.pbadge-Facebook { background: #3f51b5 !important; }
.pbadge-note { background: #34a853 !important; }
.pbadge-BASE { background: #f9ab00 !important; }
.pbadge-Stripe { background: #8e24aa !important; }

.post-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
.done-pill { margin-left: auto; font-size: 11px; padding: 2px 10px; border-radius: 10px; background: #f1f3f4; color: #5f6368; border: 1px solid #dadce0; }

.text-box {
  font-size: 14px;
  line-height: 1.78;
  color: var(--white);
  white-space: pre-wrap;
  word-break: break-word;
  background: #f8f9fa;
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 13px 14px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: text;
}
.text-box:hover { border-color: var(--cyan); background: #f1f3f4; }
.text-box.flash { border-color: var(--cyan); background: #e8f0fe; }

.memo-line { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

.abtn {
  padding: 7px 15px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.abtn:hover { background: #f1f3f4; color: var(--white); }
.abtn.primary { background: #1a73e8; border: none; color: #fff; font-size: 13px; padding: 8px 20px; }
.abtn.primary:hover { background: #1557b0; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
.abtn.copied { background: #e8f0fe; color: #1a73e8; border-color: transparent; }
.abtn.danger:hover { color: #d93025; background: #fce8e6; border-color: transparent; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .ico { font-size: 48px; margin-bottom: 14px; }
.empty-state p { font-size: 14px; line-height: 1.9; }
.empty-link { color: var(--cyan); cursor: pointer; text-decoration: underline; font-weight: 500; }


/* ★ Googleカレンダー風 カレンダーグリッド */
.cal-nav { display: flex; align-items: center; margin-bottom: 16px; gap: 16px; }
#calTitle { font-size: 22px; font-weight: 400; color: #3c4043; margin: 0; }
.nav-btn { font-size: 20px; color: #5f6368; background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.nav-btn:hover { background: #f1f3f4; }

.cal-grid-hd { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; width: 100%; margin-bottom: 0; }
.cal-hd { text-align: center; font-size: 13px; font-weight: 500; padding: 10px 0; color: #70757a; border-left: 1px solid transparent; }
.cal-hd.hd-sat { color: #1a73e8; }
.cal-hd.hd-sun { color: #d93025; }

.cal-grid { 
  display: grid; 
  grid-template-columns: repeat(7, 1fr); 
  gap: 0; 
  width: 100%; 
  border-top: 1px solid var(--border);
  border-left: 1px solid var(--border);
  background: var(--card);
}

.cal-cell {
  min-height: 120px;
  background: var(--card);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: 0; /* 角丸なし */
  padding: 4px 2px;
  cursor: pointer;
  transition: background 0.1s;
  box-shadow: none;
  position: relative;
  display: flex;
  flex-direction: column;
}
.cal-cell:hover { background: #f1f3f4; }
.cal-cell.is-today { background: var(--card); } /* 枠線強調は消して青丸のみに */
.cal-cell.is-selected { background: #e8f0fe; }
.cal-cell.other-m { opacity: 0.5; }

/* 土日背景色 (Googleカレンダーのようにうっすらと) */
.cal-cell.is-sat { background: #f8fbff; }
.cal-cell.is-sun { background: #fffcfc; }
.cal-cell.is-hol { background: #fffcfc; }

@keyframes flash-highlight {
  0% { background-color: #e8f0fe; }
  100% { background-color: transparent; }
}
.flash-cell {
  animation: flash-highlight 1.5s ease-out;
}

.cal-cell-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; padding: 0 4px; }

/* ★ 日付 (Google風の丸いアイコン) */
.cal-day { font-size: 12px; font-family: 'Noto Sans JP', sans-serif; color: #3c4043; font-weight: 500; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; margin-bottom: 0; letter-spacing: 0; }
.cal-cell.is-today .cal-day { background: #1a73e8; color: #fff !important; font-weight: 700; }
.cal-cell.is-sat .cal-day { color: #1a73e8; }
.cal-cell.is-sun .cal-day { color: #d93025; }
.cal-cell.is-hol .cal-day { color: #d93025; }

/* カレンダー内の追加ボタン */
.cal-add-btn { font-size: 16px; color: #70757a; background: transparent; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: background 0.2s, opacity 0.2s; }
.cal-cell:hover .cal-add-btn { opacity: 1; }
.cal-add-btn:hover { background: #e8eaed !important; color: #202124; transform: none; }

.hol-name { font-size: 10px; color: #d93025; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: right; line-height: 24px; margin-right: 4px; }

/* ★ Googleカレンダー風 イベントバー */
.cal-dot { 
  font-size: 11px; font-weight: 500; padding: 3px 6px; border-radius: 4px; 
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
  margin: 0 2px 2px 2px; line-height: 1.4; cursor: pointer; 
  transition: filter 0.2s; 
  position: relative; z-index: 10; 
  border: none !important; 
  box-shadow: none; 
  color: #fff !important; /* 文字はすべて白 */
  display: block; /* 横幅いっぱいに広げる */
}
.cal-dot:hover { filter: brightness(0.85); transform: none; }

/* ★ カレンダー：各種カラーパレット（ベタ塗り） */
.cal-dot.x-src { background: #039be5 !important; } 
.cal-dot.threads-src { background: #616161 !important; } 
.cal-dot.fb-src { background: #3f51b5 !important; } 
.cal-dot.note-src { background: #34a853 !important; } 
.cal-dot.base-src { background: #f9ab00 !important; } 
.cal-dot.stripe-src { background: #8e24aa !important; } 
.cal-dot.pink-src { background: #d93025 !important; } /* 赤系（複数選択） */
.cal-dot.note-stripe-src { background: #009688 !important; } /* 青緑系 */


.day-detail {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
}
.dd-placeholder { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; line-height: 2; }
.dd-cards-wrap { display: flex; flex-wrap: wrap; gap: 14px; }
.dd-title { font-size: 15px; font-weight: 500; color: #3c4043; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
.dd-add-link { font-size: 12px; color: var(--cyan); cursor: pointer; font-weight: 500; }
.dd-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 18px 0; }
.dd-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; background: #fff; border: 1px solid var(--border); border-radius: 8px; transition: box-shadow 0.2s; flex: 1 1 360px; }
.dd-card:hover { box-shadow: var(--shadow); }
.dd-left { min-width: 60px; display: flex; flex-direction: column; gap: 4px; }
.dd-text { flex: 1; font-size: 13px; line-height: 1.7; color: var(--white); white-space: pre-wrap; word-break: break-word; }
.dd-actions { display: flex; flex-direction: row; flex-wrap: wrap; gap: 5px; }
.smbtn { padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
.smbtn:hover { background: #f1f3f4; color: var(--white); }
.smbtn.danger:hover { color: #d93025; background: #fce8e6; border-color: transparent; }

/* 今日の投稿 */
.today-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 16px; }
.today-grid .today-card { margin-bottom: 0; }
/* ネタ作成 */
#view-create > * { max-width: 660px; }
/* ネタ一覧 */
.stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 14px; }
.stock-grid .stock-card { margin-bottom: 0; }

/* フォーム */
.form-sec { margin-bottom: 16px; }
.flabel { display: block; font-size: 12px; font-weight: 500; color: #3c4043; margin-bottom: 7px; }
input[type=text], input[type=datetime-local], textarea, select { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: 4px; color: var(--white); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; padding: 10px 13px; outline: none; transition: border-color 0.2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.01); }
input:focus, textarea:focus, select:focus { border-color: var(--cyan); border-width: 2px; padding: 9px 12px; }
input[type=datetime-local] { color-scheme: light; }
textarea { resize: vertical; min-height: 120px; line-height: 1.7; }
select option { background: #fff; color: var(--white); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.ppicker { display: flex; gap: 8px; flex-wrap: wrap; }

/* ★ フォームボタン（Google風に白抜き→ベタ塗りに変化） */
.pbtn { flex: 1; min-width: 80px; padding: 9px 6px; border-radius: 6px; border: 1px solid var(--border); background: #fff; color: #5f6368; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
.pbtn:hover { background: #f1f3f4; }
.pbtn[data-p="X"]:not([class*="on-"]), .pbtn[data-p="Threads"]:not([class*="on-"]), .pbtn[data-p="Facebook"]:not([class*="on-"]) { border-color: var(--border) !important; background-color: #fff !important; color: #5f6368 !important; font-weight: 500 !important; box-shadow: none !important; }

/* フォームボタン：選択時ベタ塗り */
.pbtn.on-X { background: #039be5 !important; color: #fff !important; border-color: #039be5 !important; font-weight: 700 !important; }
.pbtn.on-Threads { background: #616161 !important; color: #fff !important; border-color: #616161 !important; font-weight: 700 !important; }
.pbtn.on-Facebook { background: #3f51b5 !important; color: #fff !important; border-color: #3f51b5 !important; font-weight: 700 !important; }
.pbtn.on-note { background: #34a853 !important; color: #fff !important; border-color: #34a853 !important; font-weight: 700 !important; }
.pbtn.on-BASE { background: #f9ab00 !important; color: #fff !important; border-color: #f9ab00 !important; font-weight: 700 !important; }
.pbtn.on-Stripe { background: #8e24aa !important; color: #fff !important; border-color: #8e24aa !important; font-weight: 700 !important; }

.char-cc { text-align: right; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 4px; }
.char-cc.warn { color: var(--draft); }
.char-cc.over { color: var(--danger); }

/* 元ネタ情報ボックス */
.source-box { background: #f8f9fa; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; display: none; }
.source-box.show { display: block; }
.source-box-title { font-size: 13px; font-weight: 500; color: #3c4043; margin-bottom: 12px; }

/* ★ リスト内に表示されるリンク表示部分 */
.card-source { font-size: 12px; color: var(--white); margin-bottom: 10px; padding: 10px 14px; border-radius: 8px; line-height: 1.6; border: 1px solid var(--border); background: #fafafa; }
.card-source-title { font-weight: 500; margin-bottom: 6px; color: #3c4043; }
.card-source a { color: #1a73e8; text-decoration: none; font-weight: 500; word-break: break-all; transition: text-decoration 0.2s; }
.card-source a:hover { text-decoration: underline; }

/* ネタ作成のボタンエリア */
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-save { flex: 2; padding: 12px; background: #1a73e8; border: none; border-radius: 6px; color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s, box-shadow 0.2s; }
.btn-save:hover { background: #1557b0; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); }
.btn-clear { flex: 1; padding: 12px; background: #fff; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-clear:hover { background: #f1f3f4; color: var(--white); }
.btn-danger-form { flex: 1; padding: 12px; background: #fff; border: 1px solid transparent; border-radius: 6px; color: #d93025; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: none; }
.btn-danger-form:hover { background: #fce8e6; }

/* FAB (Floating Action Button) */
.fab-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #ffffff;
  color: #ea4335; /* Googleカラーの＋ */
  font-size: 32px;
  font-weight: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  z-index: 400;
  border: 1px solid #dadce0;
  line-height: 1;
}
.fab-btn:hover {
  background: #f8f9fa;
  box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
}
/* Google風の多色十字アイコンを作るための擬似要素 */
.fab-btn::before {
  content: "＋";
  background: linear-gradient(135deg, #ea4335 25%, #4285f4 25%, #4285f4 50%, #34a853 50%, #34a853 75%, #fbbc05 75%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 400;
}

.edit-notice { font-size: 12px; color: #b45309; padding: 9px 14px; background: #fef3c7; border-radius: 6px; margin-bottom: 14px; border: 1px solid #fde68a; display: none; }
.sfilter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.sfbtn { padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.18s; }
.sfbtn.on { background: #e8f0fe; border-color: transparent; color: #1a73e8; font-weight: 700; }
.sfbtn:hover:not(.on) { background: #f1f3f4; color: var(--white); }
.sf-srch { margin-left: auto; background: #fff; border: 1px solid var(--border); border-radius: 4px; color: var(--white); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 8px 12px; width: 180px; outline: none; }
.sf-srch:focus { border-color: var(--cyan); border-width: 2px; padding: 7px 11px; }
.stock-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; animation: fadeIn 0.25s ease; transition: box-shadow 0.18s, border-color 0.18s; }
.stock-card:hover { box-shadow: var(--shadow); }
.sc-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 9px; }
.spill { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.spill-draft { background: #fef3c7; color: #b45309; }
.spill-scheduled { background: #e8f0fe; color: #1a73e8; }
.spill-posted { background: #e6f4ea; color: #137333; }
.sc-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.sc-text { font-size: 13px; line-height: 1.7; color: var(--white); white-space: pre-wrap; word-break: break-word; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.sc-memo { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.sc-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.scbtn { padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.18s; }
.scbtn:hover { background: #f1f3f4; color: var(--white); }
.scbtn.danger:hover { color: #d93025; background: #fce8e6; border-color: transparent; }
.scbtn.copied { background: #e8f0fe; color: #1a73e8; border-color: transparent; }
.sc-chars { margin-left: auto; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ヘッダー右側 */
.header-right { display: flex; align-items: center; gap: 10px; }
.hdr-btn {
  padding: 6px 14px; border-radius: 4px;
  border: 1px solid var(--border); background: #fff;
  color: var(--muted); font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.hdr-btn:hover { background: #f1f3f4; color: var(--white); }
.hdr-btn.accent { background: #1a73e8; border: none; color: #fff; }
.hdr-btn.accent:hover { background: #1557b0; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }

/* カスタム日付ピッカー */
.date-picker-wrap { position: relative; }
.date-picker-btn {
  width: 100%; padding: 10px 13px; background: #fff;
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--white); font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; text-align: left; cursor: pointer;
  transition: border-color 0.2s;
}
.date-picker-btn:hover, .date-picker-btn.open { border-color: var(--cyan); border-width: 2px; padding: 9px 12px; }
.date-picker-panel {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 500;
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; width: 310px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  animation: fadeIn 0.18s ease;
}
.dp-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-weight: 500; font-size: 14px; color: var(--white); }
.dp-cal-nav button { width: 28px; height: 28px; border: none; background: transparent; border-radius: 50%; cursor: pointer; font-size: 15px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.dp-cal-nav button:hover { background: #f1f3f4; }
.dp-cal-hd { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
.dp-cal-hd span { text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); padding: 4px 0; }
.dp-cal-hd .sat { color: #1a73e8; }
.dp-cal-hd .sun { color: #d93025; }
.dp-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.dp-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 12px; font-family: 'DM Mono', monospace;
  cursor: pointer; color: var(--white); transition: all 0.15s;
  border: 1px solid transparent;
}
.dp-day:hover { background: #f1f3f4; }
.dp-day.other { color: #dadce0; pointer-events: none; }
.dp-day.today { color: #1a73e8; font-weight: 700; background: #e8f0fe; }
.dp-day.selected { background: #1a73e8; color: #fff !important; font-weight: 700; }
.dp-day.sat { color: #1a73e8; }
.dp-day.sun { color: #d93025; }
.dp-time-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.dp-time-label { font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; }
.dp-time-row select { width: auto; flex: 1; padding: 7px 8px; font-size: 13px; border-radius: 4px; }
.dp-ok-btn { flex: 1; padding: 8px; background: #1a73e8; border: none; border-radius: 4px; color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
.dp-ok-btn:hover { background: #1557b0; }
.dp-clear-btn { padding: 8px 14px; background: #fff; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.dp-clear-btn:hover { background: #f1f3f4; color: var(--white); }

.toast { position: fixed; bottom: 24px; right: 24px; background: #323232; color: #fff; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 400; z-index: 9999; animation: tin 0.3s ease, tout 0.3s ease 1.9s forwards; pointer-events: none; box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3); }
@keyframes tin { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes tout { to { opacity: 0; } }

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .cal-cell { min-height: 80px; }
  .ppicker { flex-wrap: wrap; }
  .form-actions { flex-wrap: wrap; }
  .btn-save { flex: 100%; }
}

<body>

<header>
  <!-- ★ ロゴ部分にクリックイベントとカーソルスタイルを追加 -->

<div id="view-create" class="view">

  <div id="formError" style="display:none; color: white; background: var(--danger); padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; font-weight: bold; box-shadow: 0 4px 10px rgba(239,68,68,0.3);"></div>

  <div class="form-sec">

      <label class="flabel">タイトル</label>

    <div class="form-sec" style="margin-bottom:10px;">

      <div class="form-sec" style="margin-bottom:10px;">

  <div class="form-sec">
    <label class="flabel">投稿テキスト <span style="font-size:10px;color:var(--muted);font-weight:400;">（SNSに投稿する告知文）</span></label>
    <textarea id="fText" placeholder="投稿内容を入力...&#10;ハッシュタグもここに書いておくと便利です" oninput="updateCC()"></textarea>

  <div class="form-row">

        <button type="button" class="date-picker-btn" onclick="toggleDatePicker()">

            <button type="button" onclick="dpChangeMonth(1)">›</button>

            <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span><span class="sun">日</span>

          <div class="dp-time-row">

<!-- ネタ一覧 -->

    <button class="sfbtn" data-f="draft" onclick="setSF('draft',this)">📝 下書き</button>
    <button class="sfbtn" data-f="scheduled" onclick="setSF('scheduled',this)">📅 予定</button>
    <button class="sfbtn" data-f="posted" onclick="setSF('posted',this)">✅ 済み</button>
    <input class="sf-srch" type="text" placeholder="🔍 検索..." id="stockSearch" oninput="renderStock()">
  </div>
  <div class="stock-grid" id="stockList"></div>
</div>

<!-- ★ 新規作成用のフローティングボタン（FAB） -->
<button class="fab-btn" id="fabBtn" onclick="createNewPost()"></button>

<script>
let posts = [];
try {
  posts = JSON.parse(localStorage.getItem('sns_mgr_v2') || '[]');
} catch (e) {
  console.warn('プレビュー環境のため、ブラウザの保存機能が制限されています。');
}

let selP = [];
let editId = null;
let cY = new Date().getFullYear();
let cM = new Date().getMonth();
let selDate = null;
let sf = 'all';
let dpYear = new Date().getFullYear();
let dpMonth = new Date().getMonth();
let dpSelDate = null;

const save = () => {
  try {
    localStorage.setItem('sns_mgr_v2', JSON.stringify(posts));
  } catch (e) {}
};

const WD = ['日','月','火','水','木','金','土'];
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
const pad = n => String(n).padStart(2,'0');
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDt = d => {
  if (!d) return '未設定';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
};

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

function showError(msg) {
  const el = document.getElementById('formError');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  window.scrollTo(0, 0); 
  setTimeout(() => el.style.display = 'none', 4500);
}

function initDate() {
  const d = new Date();
  document.getElementById('hDate').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;
}

function gotoTab(name, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab:not(a)').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(el && !el.tagName.toLowerCase().includes('a')) el.classList.add('active');
  
  const fab = document.getElementById('fabBtn');
  if (fab) {
    fab.style.display = (name === 'create') ? 'none' : 'flex';
  }

  if (name === 'today') renderToday();
  if (name === 'calendar') renderCalendar();
  if (name === 'stock') renderStock();
}

function renderToday() {
  const ts = todayStr();
  const d = new Date();
  document.getElementById('todayLabel').textContent = `${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;

  const todayPosts = posts.filter(p => p.date && p.date.startsWith(ts) && p.status !== 'posted');
  const donePosts  = posts.filter(p => p.date && p.date.startsWith(ts) && p.status === 'posted');
  document.getElementById('todayNum').innerHTML = `${todayPosts.length}<span>件</span>`;

  const container = document.getElementById('todayList');
  if (todayPosts.length + donePosts.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="ico">😴</div>
      <p>今日の投稿予定はありません。<br><br>
      <span class="empty-link" onclick="createNewPost()">「＋」ボタン</span>で
      今日の日時をセットして<br>投稿内容を登録しておきましょう！</p>
    </div>`;
    return;
  }

  const all = [...todayPosts, ...donePosts].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  container.innerHTML = all.map(p => {
    const badges = p.platforms.map(pl => `<span class="pbadge pbadge-${pl}">${pl==='X'?'𝕏 X':pl}</span>`).join('');
    const timeStr = p.date ? p.date.slice(11,16) : '';
    const done = p.status === 'posted';
    return `<div class="today-card ${done?'is-done':''}" id="tc-${p.id}">
      <div class="card-top">
        ${badges}
        ${timeStr ? `<span class="post-time">🕐 ${timeStr}</span>` : ''}
        ${done ? '<span class="done-pill">✅ 投稿済み</span>' : ''}
      </div>
      <div class="text-box" id="tb-${p.id}" onclick="flashCopy('${p.id}', this)">${esc(p.text)}</div>
      ${srcHtml(p)}
      ${p.memo ? `<div class="memo-line">💬 ${esc(p.memo)}</div>` : ''}
      <div class="card-actions">
        <button class="abtn primary" onclick="copyBtn('${p.id}', this)">📋 コピーする</button>
        ${!done ? `<button class="abtn" onclick="markPosted('${p.id}')">✅ 投稿済みに</button>` : ''}
        <button class="abtn" onclick="editPost('${p.id}')">✏️ 編集</button>
        <button class="abtn danger" onclick="delPost('${p.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function gotoTabByName(name) {
  const tabs = document.querySelectorAll('.tab:not(a)');
  const names = ['today','calendar','create','stock'];
  const idx = names.indexOf(name);
  if (idx > -1 && tabs[idx]) {
    gotoTab(name, tabs[idx]);
  }
}

function createNewPost() {
  clearForm(false);
  gotoTabByName('create');
  window.scrollTo(0, 0);
  setTimeout(() => document.getElementById('fText').focus(), 100);
}

async function doCopy(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return false;
  try { 
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(p.text); 
      return true;
    } else {
      throw new Error('Clipboard API unavailable');
    }
  } catch (err) {
    try {
      const ta = document.createElement('textarea');
      ta.value = p.text;
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const res = document.execCommand('copy');
      document.body.removeChild(ta);
      if (res) return true;
    } catch(e2) {}
    showToast('手持でコピーしてください'); 
    return false; 
  }
}

async function flashCopy(id, el) {
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 800);
  const ok = await doCopy(id);
  if (ok) showToast('📋 コピーしました！貼り付けて投稿してください');
}

async function copyBtn(id, btn) {
  const ok = await doCopy(id);
  if (ok) {
    btn.textContent = '✅ コピー完了！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コピーする'; btn.classList.remove('copied'); }, 2500);
  }
}

function markPosted(id) {
  const p = posts.find(x => x.id === id);
  if (p) { p.status = 'posted'; p.updatedAt = Date.now(); }
  save(); renderToday(); renderStock();
  showToast('✅ 投稿済みにしました！');
}

function delPost(id) {
  if (!confirm('この投稿を削除しますか？')) return;
  posts = posts.filter(x => x.id !== id);
  save(); 
  
  renderToday(); 
  renderStock(); 
  renderCalendar(); 
  
  if (selDate) renderDayDetail(selDate); 
  
  showToast('🗑️ 削除しました');
  
  if (editId === id) {
    clearForm(true); 
    gotoTabByName('calendar');
  }
}

function deleteFromEdit() {
  if (editId) {
    delPost(editId);
  }
}

function editPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  editId = id;
  selP = [...p.platforms];
  document.getElementById('fText').value = p.text;
  document.getElementById('fDate').value = p.date || '';
  document.getElementById('fMemo').value = p.memo || '';
  document.getElementById('fStatus').value = p.status;
  document.getElementById('fSourceTitle').value = p.sourceTitle || '';
  document.getElementById('fSourceUrl').value = p.sourceUrl || '';
  
  document.getElementById('fStripeSalesUrl').value = p.stripeSalesUrl || '';
  document.getElementById('fStripeThanksUrl').value = p.stripeThanksUrl || '';

  updatePbtns(); updateCC(); updateSourceBox();
  setDatePickerValue(p.date || '');
  document.getElementById('editNotice').style.display = 'block';
  document.getElementById('formError').style.display = 'none';
  
  document.getElementById('btnDeleteForm').style.display = 'block'; 
  
  gotoTabByName('create');
  window.scrollTo(0,0);
  setTimeout(() => document.getElementById('fText').focus(), 100);
}

const JP_HOLIDAYS = {
  '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念の日',
  '2025-02-23':'天皇誕生日','2025-02-24':'天皇誕生日振替','2025-03-20':'春分の日',
  '2025-04-29':'昭和の日','2025-05-03':'憲法記念日','2025-05-04':'みどりの日',
  '2025-05-05':'こどもの日','2025-05-06':'こどもの日振替','2025-07-21':'海の日',
  '2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日',
  '2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日',
  '2025-11-24':'勤労感謝の日振替',

function renderCalendar() {
  document.getElementById('calTitle').textContent = `${cY}年 ${cM+1}月`;
  const today = new Date();
  const tsToday = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  const rawFirst = new Date(cY, cM, 1).getDay(); 
  const firstDay = (rawFirst + 6) % 7; 
  const dim = new Date(cY, cM+1, 0).getDate();
  const diPrev = new Date(cY, cM, 0).getDate();
  let total = firstDay + dim;
  if (total % 7) total += 7 - (total % 7);

  let html = '';
  for (let i = 0; i < total; i++) {
    let day, m, y, other = false;
    if (i < firstDay) {
      day = diPrev - firstDay + i + 1; m = cM - 1; y = cY; other = true;
    } else if (i >= firstDay + dim) {
      day = i - firstDay - dim + 1; m = cM + 1; y = cY; other = true;
    } else {
      day = i - firstDay + 1; m = cM; y = cY;
    }

    let rm = m, ry = y;
    if (rm < 0) { rm = 11; ry = y - 1; }
    if (rm > 11) { rm = 0; ry = y + 1; }

    const ds = `${ry}-${pad(rm+1)}-${pad(day)}`;
    const dow = new Date(ds).getDay(); 
    const isSat = dow === 6;
    const isSun = dow === 0;
    const holName = JP_HOLIDAYS[ds] || '';
    const isHol = !!holName;
    const isToday = ds === tsToday;
    const isSel = ds === selDate;

    const dp = posts.filter(p => p.date && p.date.startsWith(ds));
    
    // ★ カレンダー上のドット表示（Google風ベタ塗りカラー）
    const dots = dp.slice(0, 4).map(p => {
      const isNote = p.platforms.includes('note');
      const isBase = p.platforms.includes('BASE');
      const isStripe = p.platforms.includes('Stripe');
      
      let dotCls = 'x-src'; 
      if (isNote && isStripe) dotCls = 'note-stripe-src'; 
      else if (isNote && isBase) dotCls = 'pink-src'; 
      else if (isStripe) dotCls = 'stripe-src'; 
      else if (isBase) dotCls = 'base-src'; 
      else if (isNote) dotCls = 'note-src'; 
      else if (p.platforms.includes('Facebook')) dotCls = 'fb-src';
      else if (p.platforms.includes('Threads')) dotCls = 'threads-src';
      else if (p.platforms.includes('X')) dotCls = 'x-src';
      
      const icon = (isNote && isStripe) ? '📝💳' : (isNote && isBase) ? '📝🛒' : isStripe ? '💳' : isBase ? '🛒' : isNote ? '📝' : p.platforms[0]?.charAt(0)||'';
      const label = (p.sourceTitle || p.text).slice(0, 9);
      return `<div class="cal-dot ${dotCls}" title="クリックで修正: ${esc(p.sourceTitle || p.text)}" onclick="event.stopPropagation(); editPost('${p.id}')">${icon} ${label}</div>`;
    }).join('');

    const classes = [
      other ? 'other-m' : '',
      isToday ? 'is-today' : '',
      isSel ? 'is-selected' : '',
      isSat && !other ? 'is-sat' : '',
      (isSun || isHol) && !other ? 'is-sun' : ''
    ].filter(Boolean).join(' ');

    const holTag = isHol && !other ? `<span class="hol-name">${holName}</span>` : '';

    html += `<div id="cal-cell-${ds}" class="cal-cell ${classes}" onclick="pickDate('${ds}')">
      <div class="cal-cell-header">
        <div class="cal-day">${day}</div>
        <div class="hol-name">${holTag}</div>
        <div class="cal-add-btn" onclick="event.stopPropagation(); addForDate('${ds}')" title="この日に新規作成">＋</div>
      </div>
      ${dots}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  if (selDate) renderDayDetail(selDate);
}

function chMonth(d) {
  cM += d;
  if (cM > 11) { cM = 0; cY++; }
  if (cM < 0) { cM = 11; cY--; }
  renderCalendar();
}

function pickDate(ds) {
  selDate = ds;
  renderCalendar();
  renderDayDetail(ds);
}

function renderDayDetail(ds) {
  const [y, m, d] = ds.split('-');
  const dt = new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10));
  const dow = dt.getDay();
  const dowLabel = ['日','月','火','水','木','金','土'][dow];
  const holName = JP_HOLIDAYS[ds] || '';
  const holStr = holName ? ` 🎌${holName}` : '';
  const label = `${parseInt(m, 10)}月${parseInt(d, 10)}日（${dowLabel}）${holStr}`;
  const dp = posts.filter(p => p.date && p.date.startsWith(ds)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const cards = dp.length === 0
    ? `<div class="dd-empty">この日の投稿はありません</div>`
    : dp.map(p => {
        const bs = p.platforms.map(pl => `<span class="pbadge pbadge-${pl}" style="font-size:10px;padding:2px 7px;">${pl==='X'?'𝕏':pl==='Stripe'?'💳':pl.slice(0,2)}</span>`).join('');
        const tstr = p.date ? p.date.slice(11,16) : '';
        
        return `<div class="dd-card">
          <div class="dd-left">
            <div style="display:flex;gap:3px;flex-wrap:wrap;">${bs}</div>
            ${tstr ? `<div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;">${tstr}</div>` : ''}
            <div class="spill spill-${p.status}" style="font-size:10px;padding:2px 7px;margin-top:2px;">${p.status==='draft'?'下書き':p.status==='scheduled'?'予定':'済み'}</div>
          </div>
          <div class="dd-text">${esc(p.text)}</div>
          ${srcHtml(p)}
          <div class="dd-actions">
            <button class="smbtn" onclick="ddCopy('${p.id}',this)">📋 コピー</button>
            <button class="smbtn" onclick="editPost('${p.id}')">✏️ 編集</button>
            ${p.status!=='posted'?`<button class="smbtn" onclick="markPosted('${p.id}')">✅ 投稿済みにする</button>`:''}
            <button class="smbtn danger" onclick="delPost('${p.id}')">🗑️ 削除</button>
          </div>
        </div>`;
      }).join('');

  document.getElementById('dayDetail').innerHTML = `<div class="dd-title">
    ${label}の投稿（${dp.length}件）
    <span class="dd-add-link" onclick="addForDate('${ds}')">＋ 追加</span>
  </div><div class="dd-cards-wrap">${cards}</div>`;
}

function savePost() {
  try {
    const text = document.getElementById('fText').value.trim();
    
    if (selP.length === 0) { 
      showError('投稿先（Xやnoteなど）を1つ以上選択してください！'); 
      return; 
    }
    
    const srcTitle = document.getElementById('fSourceTitle').value.trim();
    const snsOnly = selP.every(p => ['X','Threads','Facebook'].includes(p));
    
    if (snsOnly && !text) { 
      showError('投稿テキストを入力してください！'); 
      return; 
    }
    if (!text && !srcTitle) { 
      showError('投稿テキストまたはタイトルを入力してください！'); 
      return; 
    }

    const dVal = document.getElementById('fDate').value;

    const post = {
      id: editId || Date.now().toString(),
      text, 
      platforms: [...selP],
      sourceTitle: srcTitle,
      sourceUrl: document.getElementById('fSourceUrl').value.trim(),
      stripeSalesUrl: document.getElementById('fStripeSalesUrl').value.trim(),
      stripeThanksUrl: document.getElementById('fStripeThanksUrl').value.trim(),
      date: dVal,
      memo: document.getElementById('fMemo').value.trim(),
      status: document.getElementById('fStatus').value,
      createdAt: editId ? (posts.find(p=>p.id===editId)?.createdAt || Date.now()) : Date.now(),
      updatedAt: Date.now()
    };
    
    const isEdit = !!editId;
    if (isEdit) { 
      const i = posts.findIndex(p=>p.id===editId); 
      if(i > -1) posts[i] = post; 
    } else {
      posts.unshift(post);
    }
    
    save(); 
    
    const savedDate = post.date; // 保存した日付を取得しておく
    clearForm(true); 
    showToast(isEdit ? '✅ 更新しました！' : '💾 保存しました！');
    
    if (savedDate) {
      const dStr = savedDate.slice(0, 10); 
      if (dStr) {
        const [yy, mm, dd] = dStr.split('-');
        cY = parseInt(yy, 10);
        cM = parseInt(mm, 10) - 1;
        selDate = dStr;
        
        gotoTabByName('calendar');
        
        setTimeout(() => {
          const targetCell = document.getElementById(`cal-cell-${dStr}`);
          if (targetCell) {
            targetCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
            targetCell.classList.add('flash-cell');
            setTimeout(() => targetCell.classList.remove('flash-cell'), 1600); 
          } else {
             window.scrollTo(0, 0); 
          }
        }, 80);
        
        return;
      }
    }
    
    gotoTabByName('stock');
    window.scrollTo(0, 0);
  } catch (err) {
    showError('保存中にエラーが発生しました。やり直してください。');
  }
}

// ★ 共通の「元ネタ・URL」表示ロジック（リスト・カレンダー詳細両方で使う）
function srcHtml(p) {
  if (!p.sourceTitle && !p.sourceUrl && !p.stripeSalesUrl && !p.stripeThanksUrl) return '';
  
  const hasNote = p.platforms.includes('note');
  const hasBase = p.platforms.includes('BASE');
  const hasStripe = p.platforms.includes('Stripe');
  
  let cls = 'card-source';
  if (hasNote && hasStripe) cls += ' note-stripe';
  else if (hasNote && hasBase) cls += ' note-base';
  else if (hasStripe) cls += ' stripe-only';
  else if (hasBase) cls += ' base-only';
  else cls += ' note-only'; // デフォルトは緑系

  const iconStr = [];
  if (hasNote) iconStr.push('📝');
  if (hasBase) iconStr.push('🛒');
  if (hasStripe) iconStr.push('💳');
  if (iconStr.length === 0) iconStr.push('📝');

  let html = `<div class="${cls}">`;
  if (p.sourceTitle) {
    html += `<div class="card-source-title">${iconStr.join('')} ${esc(p.sourceTitle)}</div>`;
  } else {
    html += `<div class="card-source-title">${iconStr.join('')} リンク情報</div>`;
  }

  if (p.sourceUrl) html += `<div><a href="${esc(p.sourceUrl)}" target="_blank">${esc(p.sourceUrl)}</a></div>`;
  if (p.stripeSalesUrl) html += `<div style="margin-top:3px;"><span style="opacity:0.7;">販売:</span> <a href="${esc(p.stripeSalesUrl)}" target="_blank">${esc(p.stripeSalesUrl)}</a></div>`;
  if (p.stripeThanksUrl) html += `<div style="margin-top:3px;"><span style="opacity:0.7;">完了:</span> <a href="${esc(p.stripeThanksUrl)}" target="_blank">${esc(p.stripeThanksUrl)}</a></div>`;
  html += `</div>`;
  
  return html;
}

function renderStock() {
  const q = (document.getElementById('stockSearch')?.value || '').toLowerCase();
  const fl = posts.filter(p => {
    const mf = sf === 'all' || p.status === sf;
    const ms = !q || p.text.toLowerCase().includes(q) || (p.memo||'').toLowerCase().includes(q);
    return mf && ms;
  }).sort((a,b) => {
    if (a.date && b.date) return a.date.localeCompare(b.date);
    if (a.date) return -1; if (b.date) return 1;
    return b.createdAt - a.createdAt;
  });

  const c = document.getElementById('stockList');
  if (fl.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="ico">📭</div><p>投稿がありません</p></div>`;
    return;
  }
  const stMap = { draft:['spill-draft','📝 下書き'], scheduled:['spill-scheduled','📅 予定'], posted:['spill-posted','✅ 済み'] };
  c.innerHTML = fl.map(p => {
    const bs = p.platforms.map(pl => `<span class="pbadge pbadge-${pl}" style="font-size:10px;">${pl==='X'?'𝕏':pl==='Stripe'?'💳':pl.slice(0,2)}</span>`).join('');
    const [sc,sl] = stMap[p.status]||stMap.draft;
    return `<div class="stock-card">
      <div class="sc-top">
        ${bs}
        <span class="spill ${sc}">${sl}</span>
        <span class="sc-date">🕐 ${fmtDt(p.date)}</span>
      </div>
      <div class="sc-text">${esc(p.text)}</div>
      ${srcHtml(p)}
      ${p.memo ? `<div class="sc-memo">💬 ${esc(p.memo)}</div>` : ''}
      <div class="sc-actions">
        <button class="scbtn" onclick="scCopy('${p.id}',this)">📋 コピー</button>
        <button class="scbtn" onclick="editPost('${p.id}')">✏️ 編集</button>
        ${p.status!=='posted'?`<button class="scbtn" onclick="markPosted('${p.id}')">✅ 投稿済み</button>`:''}
        <button class="scbtn danger" onclick="delPost('${p.id}')">🗑️</button>
        <span class="sc-chars">${p.text.length}文字</span>
      </div>
    </div>`;
  }).join('');
}

function dpChangeMonth(d) {
  dpMonth += d;
  if (dpMonth > 11) { dpMonth = 0; dpYear++; }
  if (dpMonth < 0) { dpMonth = 11; dpYear--; }
  renderDpCal();
}

function renderDpCal() {
  document.getElementById('dpCalTitle').textContent = `${dpYear}年${dpMonth+1}月`;
  const today = new Date();
  const tsToday = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const firstDay = new Date(dpYear, dpMonth, 1).getDay();
  const firstMon = (firstDay + 6) % 7;
  const dim = new Date(dpYear, dpMonth+1, 0).getDate();
  const diPrev = new Date(dpYear, dpMonth, 0).getDate();
  let total = firstMon + dim;
  if (total % 7) total += 7 - (total % 7);

  let html = '';
  for (let i = 0; i < total; i++) {
    let day, m, y, other = false;
    if (i < firstMon) { day = diPrev - firstMon + i + 1; m = dpMonth-1; y = dpYear; other = true; }
    else if (i >= firstMon + dim) { day = i - firstMon - dim + 1; m = dpMonth+1; y = dpYear; other = true; }
    else { day = i - firstMon + 1; m = dpMonth; y = dpYear; }
    let rm = m, ry = y;
    if (rm < 0) { rm = 11; ry--; } if (rm > 11) { rm = 0; ry++; }
    const ds = `${ry}-${pad(rm+1)}-${pad(day)}`;
    const dow = new Date(ds).getDay();
    const isSat = dow === 6, isSun = dow === 0;
    const isSel = ds === dpSelDate;
    const isToday = ds === tsToday;
    const cls = [other?'other':'', isSat&&!other?'sat':'', isSun&&!other?'sun':'', isSel?'selected':'', isToday&&!isSel?'today':''].filter(Boolean).join(' ');
    html += `<div class="dp-day ${cls}" onclick="dpPickDay('${ds}')">${day}</div>`;
  }
  document.getElementById('dpCalGrid').innerHTML = html;
}

function dpPickDay(ds) {
  dpSelDate = ds;
  renderDpCal();
  updateDatePickerLabel();
}

function updateDatePickerLabel() {
  if (!dpSelDate) return;
  const hSel = document.getElementById('dpHour');
  const mSel = document.getElementById('dpMin');
  if(!hSel || !mSel) return;
  
  const h = hSel.value;
  const m = mSel.value;
  const [y, mo, d] = dpSelDate.split('-');
  const dow = ['日','月','火','水','木','金','土'][new Date(dpSelDate).getDay()];
  
  document.getElementById('datePickerLabel').textContent = `📅 ${parseInt(mo, 10)}月${parseInt(d, 10)}日（${dow}） ${h}:${m}`;
  document.getElementById('fDate').value = `${dpSelDate}T${h}:${m}`;
}

function setDatePickerValue(val) {
  if (!val) return;
  dpSelDate = val.slice(0, 10);
  const h = val.slice(11, 13) || '09';
  const rawMin = val.slice(14, 16) || '00';
  const m = ['00','05','10','15','20','25','30','35','40','45','50','55']
    .reduce((acc, v) => Math.abs(parseInt(v)-parseInt(rawMin)) < Math.abs(parseInt(acc)-parseInt(rawMin)) ? v : acc, '00');
  dpYear = parseInt(dpSelDate.slice(0,4), 10);
  dpMonth = parseInt(dpSelDate.slice(5,7), 10) - 1;
  
  const hSel = document.getElementById('dpHour');
  const mSel = document.getElementById('dpMin');
  if(hSel) hSel.value = h;
  if(mSel) mSel.value = m;
  
  updateDatePickerLabel();
}

function backupData() {
  const data = { version: 2, exportedAt: new Date().toISOString(), posts };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `sns_posts_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click();
  showToast('⬇️ バックアップを保存しました');
}

function restoreData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const imported = data.posts || data;
      if (!Array.isArray(imported)) throw new Error('形式エラー');
      if (!confirm(`${imported.length}件のデータを復元します。\n現在のデータは上書きされます。\nよろしいですか？`)) return;
      posts = imported;
      save();
      renderToday(); renderStock();
      if (document.getElementById('view-calendar').classList.contains('active')) renderCalendar();
      showToast(`✅ ${imported.length}件のデータを復元しました`);
    } catch {
      showToast('❌ ファイルの読み込みに失敗しました');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// INIT
initDate();
initDatePicker();
clearForm(); // フォームの初期化（削除ボタンも隠す）

// ★ 初期画面を「カレンダー」に強制指定
gotoTabByName('calendar');
</script>
