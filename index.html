<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC 統合マネージャー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* カスタムフォントと背景 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
        }
        /* グラスモーフィズム */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(2, 5, 98, 0.1);
        }
        /* スクロールバー */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(34, 174, 201, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(2, 5, 98, 0.5); }
        
        /* 横スクロールバーを隠すクラス */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }
        
        /* カスタムカラー */
        .text-spc-navy { color: #020562; }
        .bg-spc-navy { background-color: #020562; }
        .border-spc-navy { border-color: #020562; }
        .text-spc-cyan { color: #22AEC9; }
        .bg-spc-cyan { background-color: #22AEC9; }
        .border-spc-cyan { border-color: #22AEC9; }
        .hover-bg-spc-cyan:hover { background-color: #1e9cb5; }
        
        /* フォームオートコンプリート色リセット */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0px 1000px white inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- アイコンコンポーネント ---
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10B981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconEye = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconEyeOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconExternalLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const IconChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconKey = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>;
        const IconCode = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
        const IconGripVertical = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>;
        // 新規追加アイコン（ページネーション用）
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;

        // カテゴリ定義
        const PASSWORD_CATEGORIES = [
            { id: 'all', label: 'すべて' },
            { id: 'subscription', label: '👑 有料サブスク' },
            { id: 'business', label: '💼 ビジネス用' },
            { id: 'private', label: '⛳️ プライベート' },
            { id: 'other', label: '🛠 その他' }
        ];

        const APP_CATEGORIES = [
            { id: 'all', label: 'すべて' },
            { id: 'active', label: '🚀 公開中' },
            { id: 'testing', label: '👀 動作確認中' },
            { id: 'development', label: '🔨 開発中' },
            { id: 'planning', label: '💡 企画中' }
        ];

        const STORAGE_KEY = 'spc_integrated_manager_data';
        const OLD_STORAGE_KEY = 'spc_password_manager_data'; // 互換性のため

        // 1ページあたりの表示件数
        const ITEMS_PER_PAGE = 30;

        const App = () => {
            // ステート管理
            const [mode, setMode] = useState('app'); // デフォルトを 'app' に変更
            const [data, setData] = useState({ passwords: [], apps: [] });
            
            const [searchTerm, setSearchTerm] = useState('');
            const [currentCategory, setCurrentCategory] = useState('all');
            
            const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
            const [isAppModalOpen, setIsAppModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [toastMessage, setToastMessage] = useState('');
            const fileInputRef = useRef(null);

            // ページネーション用ステート
            const [currentPage, setCurrentPage] = useState(1);
            
            // アプリ管理用の有料/無料 絞り込みフィルター
            const [appPriceFilter, setAppPriceFilter] = useState('all'); // 'all', 'free', 'paid'
            
            // アプリ管理用の種類（仕事/PB）絞り込みフィルター
            const [appTypeFilter, setAppTypeFilter] = useState('all'); // 'all', 'work', 'private'

            // カードの展開状態をすべて閉じるためのトリガー
            const [resetTrigger, setResetTrigger] = useState(0);

            // 独自のダイアログステート
            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });

            // ドラッグ＆ドロップ用ステート
            const [dragItemIndex, setDragItemIndex] = useState(null);
            const [dragOverItemIndex, setDragOverItemIndex] = useState(null);

            const showAlert = (message) => setDialog({ isOpen: true, type: 'alert', message, onConfirm: null });
            const showConfirm = (message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', message, onConfirm });

            // 初回ロード時にLocalStorageからデータを取得
            useEffect(() => {
                const loadData = () => {
                    const savedData = localStorage.getItem(STORAGE_KEY);
                    if (savedData) {
                        try {
                            setData(JSON.parse(savedData));
                            return;
                        } catch (e) {
                            console.error('データの読み込みに失敗しました', e);
                        }
                    }
                    
                    const oldSavedData = localStorage.getItem(OLD_STORAGE_KEY);
                    if (oldSavedData) {
                        try {
                            const oldPasswords = JSON.parse(oldSavedData);
                            if (Array.isArray(oldPasswords)) {
                                const newData = { passwords: oldPasswords, apps: [] };
                                setData(newData);
                                localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
                            }
                        } catch (e) {
                            console.error('旧データの読み込みに失敗しました', e);
                        }
                    }
                };
                loadData();
            }, []);

            // データが変更されたらLocalStorageに保存
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }, [data]);

            // モードが切り替わったら状態をリセット
            useEffect(() => {
                setCurrentCategory('all');
                setSearchTerm('');
                setCurrentPage(1); // ページを1に戻す
                setAppPriceFilter('all');
                setAppTypeFilter('all');
            }, [mode]);

            // カテゴリや検索、フィルターが変わったらページを1に戻す
            useEffect(() => {
                setCurrentPage(1);
            }, [currentCategory, searchTerm, appPriceFilter, appTypeFilter]);

            // 並び替え可能な条件（「すべて」カテゴリかつ検索ワードなし、かつ各種絞り込みなし）
            const canSort = currentCategory === 'all' && searchTerm === '' && appPriceFilter === 'all' && appTypeFilter === 'all';

            // ドラッグ＆ドロップのハンドラー（ページネーションを考慮してグローバルインデックスを使用）
            const handleDragStart = (e, globalIndex) => {
                setDragItemIndex(globalIndex);
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", globalIndex);
            };

            const handleDragEnter = (globalIndex) => {
                setDragOverItemIndex(globalIndex);
            };

            const handleDragEnd = () => {
                setDragItemIndex(null);
                setDragOverItemIndex(null);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                if (dragItemIndex === null || dragOverItemIndex === null || dragItemIndex === dragOverItemIndex) {
                    handleDragEnd();
                    return;
                }

                setData(prevData => {
                    const currentItems = mode === 'password' ? [...prevData.passwords] : [...prevData.apps];
                    const draggedItem = currentItems[dragItemIndex];
                    
                    currentItems.splice(dragItemIndex, 1);
                    currentItems.splice(dragOverItemIndex, 0, draggedItem);
                    
                    return mode === 'password' 
                        ? { ...prevData, passwords: currentItems }
                        : { ...prevData, apps: currentItems };
                });
                
                handleDragEnd();
            };

            // ドラッグ関連のプロパティを生成する関数（ローカルインデックスをグローバルインデックスに変換）
            const createDragProps = (localIndex) => {
                const globalIndex = (currentPage - 1) * ITEMS_PER_PAGE + localIndex;
                return {
                    onDragStart: (e) => handleDragStart(e, globalIndex),
                    onDragEnter: () => handleDragEnter(globalIndex),
                    onDragOver: (e) => { e.preventDefault(); },
                    onDragEnd: handleDragEnd,
                    onDrop: handleDrop,
                    isDragging: dragItemIndex === globalIndex,
                    isDragOver: dragOverItemIndex === globalIndex && dragItemIndex !== globalIndex,
                };
            };

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3000);
            };

            const handleSavePassword = (formData) => {
                if (editingItem) {
                    const updatedPasswords = data.passwords.map(item => item.id === editingItem.id ? { ...formData, id: item.id, updatedAt: new Date().toISOString() } : item);
                    setData({ ...data, passwords: updatedPasswords });
                    showToast('更新しました');
                } else {
                    const newItem = {
                        ...formData,
                        id: crypto.randomUUID(),
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    setData({ ...data, passwords: [newItem, ...data.passwords] });
                    showToast('追加しました');
                    setCurrentPage(1); // 新規追加時は1ページ目に戻る
                }
                setIsPasswordModalOpen(false);
                setEditingItem(null);
            };

            const handleSaveApp = (formData) => {
                if (editingItem) {
                    const updatedApps = data.apps.map(item => item.id === editingItem.id ? { ...formData, id: item.id, updatedAt: new Date().toISOString() } : item);
                    setData({ ...data, apps: updatedApps });
                    showToast('更新しました');
                } else {
                    const newItem = {
                        ...formData,
                        id: crypto.randomUUID(),
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    setData({ ...data, apps: [newItem, ...data.apps] });
                    showToast('追加しました');
                    setCurrentPage(1); // 新規追加時は1ページ目に戻る
                }
                setIsAppModalOpen(false);
                setEditingItem(null);
            };

            const handleDelete = (id, targetMode) => {
                showConfirm('本当にこの項目を削除しますか？', () => {
                    if (targetMode === 'password') {
                        setData(prev => ({ ...prev, passwords: prev.passwords.filter(item => item.id !== id) }));
                    } else {
                        setData(prev => ({ ...prev, apps: prev.apps.filter(item => item.id !== id) }));
                    }
                    showToast('削除しました');
                });
            };

            const openEditModal = (item) => {
                setEditingItem(item);
                if (mode === 'password') {
                    setIsPasswordModalOpen(true);
                } else {
                    setIsAppModalOpen(true);
                }
            };

            const openAddModal = () => {
                setEditingItem(null);
                if (mode === 'password') {
                    setIsPasswordModalOpen(true);
                } else {
                    setIsAppModalOpen(true);
                }
            };

            const handleExport = () => {
                if (data.passwords.length === 0 && data.apps.length === 0) {
                    showAlert('バックアップするデータがありません。');
                    return;
                }
                const dataStr = JSON.stringify(data, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                a.download = `spc_integrated_backup_${date}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('バックアップを保存しました');
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        
                        showConfirm('バックアップデータを読み込みます。\n現在のデータと統合（同じIDのものは上書き）してよろしいですか？', () => {
                            setData(prevData => {
                                let newPasswords = [...(prevData.passwords || [])];
                                let newApps = [...(prevData.apps || [])];

                                if (Array.isArray(importedData)) {
                                    importedData.forEach(importedItem => {
                                        const existingIndex = newPasswords.findIndex(i => i.id === importedItem.id);
                                        if (existingIndex >= 0) newPasswords[existingIndex] = importedItem;
                                        else newPasswords.push(importedItem);
                                    });
                                } else if (importedData.passwords || importedData.apps) {
                                    if (importedData.passwords) {
                                        importedData.passwords.forEach(importedItem => {
                                            const existingIndex = newPasswords.findIndex(i => i.id === importedItem.id);
                                            if (existingIndex >= 0) newPasswords[existingIndex] = importedItem;
                                            else newPasswords.push(importedItem);
                                        });
                                    }
                                    if (importedData.apps) {
                                        importedData.apps.forEach(importedItem => {
                                            const existingIndex = newApps.findIndex(i => i.id === importedItem.id);
                                            if (existingIndex >= 0) newApps[existingIndex] = importedItem;
                                            else newApps.push(importedItem);
                                        });
                                    }
                                }
                                return { passwords: newPasswords, apps: newApps };
                            });
                            showToast('データを復元しました');
                            setCurrentPage(1); // 復元後に1ページ目に戻る
                        });
                    } catch (err) {
                        showAlert('ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            // 全データのフィルタリング
            const displayItems = useMemo(() => {
                const sourceItems = mode === 'password' ? data.passwords : data.apps;
                
                return sourceItems.filter(item => {
                    const matchCategory = currentCategory === 'all' || item.category === currentCategory;
                    const searchLower = searchTerm.toLowerCase();
                    
                    let matchSearch = false;
                    let matchAppPrice = true; 
                    let matchAppType = true;

                    if (mode === 'password') {
                        matchSearch = 
                            (item.title && item.title.toLowerCase().includes(searchLower)) ||
                            (item.username && item.username.toLowerCase().includes(searchLower)) ||
                            (item.memo && item.memo.toLowerCase().includes(searchLower));
                    } else {
                        matchSearch = 
                            (item.title && item.title.toLowerCase().includes(searchLower)) ||
                            (item.localHtml && item.localHtml.toLowerCase().includes(searchLower)) ||
                            (item.githubUrl && item.githubUrl.toLowerCase().includes(searchLower)) ||
                            (item.memo && item.memo.toLowerCase().includes(searchLower));
                            
                        // アプリ管理時の「有料/無料」フィルタリング
                        if (appPriceFilter !== 'all') {
                            const itemPriceType = item.priceType || 'free';
                            matchAppPrice = itemPriceType === appPriceFilter;
                        }

                        // アプリ管理時の「仕事/PB」フィルタリング
                        if (appTypeFilter !== 'all') {
                            const itemAppType = item.appType || 'work';
                            matchAppType = itemAppType === appTypeFilter;
                        }
                    }
                    return matchCategory && matchSearch && matchAppPrice && matchAppType;
                });
            }, [data, mode, searchTerm, currentCategory, appPriceFilter, appTypeFilter]);

            // 総ページ数の計算
            const totalPages = Math.max(1, Math.ceil(displayItems.length / ITEMS_PER_PAGE));

            // 削除などでアイテムが減り、現在のページが存在しなくなった場合の安全装置
            useEffect(() => {
                if (currentPage > totalPages) {
                    setCurrentPage(totalPages);
                }
            }, [totalPages, currentPage]);

            // 現在のページに表示するアイテム（30件分）だけを切り出す
            const paginatedItems = useMemo(() => {
                const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
                return displayItems.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            const currentCategories = mode === 'password' ? PASSWORD_CATEGORIES : APP_CATEGORIES;

                                <h1 className="text-3xl font-bold text-spc-navy tracking-tight mb-2 text-center md:text-left">

                                </h1>
                                <p className="text-sm text-gray-600 text-center md:text-left">アカウントとアプリ情報を一元管理</p>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row items-center space-y-3 sm:space-y-0 sm:space-x-3">
                                {/* バックアップと復元ボタン */}
                                <div className="flex space-x-2 w-full sm:w-auto justify-center">
                                    <button onClick={handleExport} className="flex items-center text-xs px-3 py-2 bg-white border border-spc-navy text-spc-navy rounded-md hover:bg-blue-50 transition-colors shadow-sm" title="データをパソコンに保存">
                                        <IconDownload /><span className="ml-1">バックアップ</span>
                                    </button>
                                    <button onClick={() => fileInputRef.current.click()} className="flex items-center text-xs px-3 py-2 bg-white border border-spc-cyan text-spc-cyan rounded-md hover:bg-cyan-50 transition-colors shadow-sm" title="保存したデータを読み込む">
                                        <IconUpload /><span className="ml-1">データ復元</span>
                                    </button>
                                    <input type="file" ref={fileInputRef} onChange={handleImport} accept=".json" className="hidden" />
                                </div>
                            </div>
                        </div>

                        {/* モード切替タブと検索バーの行 */}
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 space-y-4 md:space-y-0">
                            {/* モード切替タブ（大きなスイッチ） */}
                            <div className="flex p-1 bg-white/50 border border-gray-200 rounded-xl shadow-inner w-full md:w-auto md:min-w-[320px]">
                                <button
                                    onClick={() => {
                                        setMode('password');
                                        setResetTrigger(prev => prev + 1);
                                    }}
                                    className={`flex-1 flex items-center justify-center py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 ${
                                        mode === 'password' 
                                        ? 'bg-spc-navy text-white shadow-md transform scale-[1.02]' 
                                        : 'text-gray-500 hover:text-spc-navy hover:bg-white/60'
                                    }`}
                                >
                                    <IconKey /> <span className="ml-2">パスワード管理</span>
                                </button>
                                <button
                                    onClick={() => {
                                        setMode('app');
                                        setResetTrigger(prev => prev + 1);
                                    }}
                                    className={`flex-1 flex items-center justify-center py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 ${
                                        mode === 'app' 
                                        ? 'bg-spc-cyan text-white shadow-md transform scale-[1.02]' 
                                        : 'text-gray-500 hover:text-spc-cyan hover:bg-white/60'
                                    }`}
                                >
                                    <IconCode /> <span className="ml-2">アプリ管理</span>
                                </button>
                            </div>

                            {/* 検索バー */}
                            <div className="relative w-full md:w-72">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                    <IconSearch />
                                </div>
                                <input
                                    type="text"
                                    className={`w-full pl-10 pr-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:border-transparent shadow-sm ${mode === 'password' ? 'focus:ring-spc-navy' : 'focus:ring-spc-cyan'}`}
                                    placeholder="タイトルなどで検索..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        {/* カテゴリフィルタ */}
                        <div className="flex overflow-x-auto hide-scrollbar w-full space-x-2 pb-2 mb-2">
                            {currentCategories.map(cat => (
                                <button
                                    key={cat.id}

                                    className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium transition-colors ${
                                        currentCategory === cat.id 
                                        ? (mode === 'password' ? 'bg-spc-navy text-white' : 'bg-spc-cyan text-white') + ' shadow-md' 
                                        : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'
                                    }`}
                                >
                                    {cat.label}
                                </button>

                        {/* アプリ管理モード時のみ表示されるサブフィルター */}
                        {mode === 'app' && (
                            <div className="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-4 mb-4 animate-fade-in ml-1">
                                {/* 有料/無料フィルター */}
                                <div className="flex space-x-2">
                                    <button onClick={() => setAppPriceFilter('all')} className={`px-3 py-1 text-xs rounded-full border transition-colors ${appPriceFilter === 'all' ? 'bg-spc-cyan text-white border-spc-cyan shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                        すべて
                                    </button>
                                    <button onClick={() => setAppPriceFilter('free')} className={`px-3 py-1 text-xs rounded-full border transition-colors ${appPriceFilter === 'free' ? 'bg-spc-cyan text-white border-spc-cyan shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                        🆓 無料
                                    </button>
                                    <button onClick={() => setAppPriceFilter('paid')} className={`px-3 py-1 text-xs rounded-full border transition-colors ${appPriceFilter === 'paid' ? 'bg-spc-cyan text-white border-spc-cyan shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                        💎 有料
                                    </button>
                                </div>
                                
                                {/* 種類（仕事/PB）フィルター */}
                                <div className="flex space-x-2">
                                    <button onClick={() => setAppTypeFilter('all')} className={`px-3 py-1 text-xs rounded-full border transition-colors ${appTypeFilter === 'all' ? 'bg-indigo-500 text-white border-indigo-500 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                        すべて
                                    </button>
                                    <button onClick={() => setAppTypeFilter('work')} className={`px-3 py-1 text-xs rounded-full border transition-colors ${appTypeFilter === 'work' ? 'bg-indigo-500 text-white border-indigo-500 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                        💼 仕事
                                    </button>
                                    <button onClick={() => setAppTypeFilter('private')} className={`px-3 py-1 text-xs rounded-full border transition-colors ${appTypeFilter === 'private' ? 'bg-indigo-500 text-white border-indigo-500 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                        ⛳️ PB
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ページネーション（アイテムが30個より多い場合のみ表示） */}
                        {totalPages > 1 && (
                            <div className="flex justify-center items-center space-x-4 mb-4 animate-fade-in">
                                <button
                                    onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                    disabled={currentPage === 1}
                                    className={`flex items-center px-3 py-1.5 rounded-lg border text-sm font-medium transition-colors ${currentPage === 1 ? 'border-gray-200 text-gray-400 bg-gray-50 cursor-not-allowed' : `border-${mode === 'password' ? 'spc-navy' : 'spc-cyan'} text-${mode === 'password' ? 'spc-navy' : 'spc-cyan'} bg-white hover:bg-gray-50 shadow-sm`}`}
                                >
                                    <IconChevronLeft /> <span className="ml-1">前へ</span>
                                </button>
                                <div className="text-sm font-bold text-gray-600 bg-white px-4 py-1.5 rounded-lg border border-gray-200 shadow-sm">
                                    {currentPage} <span className="text-gray-400 mx-1">/</span> {totalPages}
                                </div>
                                <button
                                    onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                    disabled={currentPage === totalPages}
                                    className={`flex items-center px-3 py-1.5 rounded-lg border text-sm font-medium transition-colors ${currentPage === totalPages ? 'border-gray-200 text-gray-400 bg-gray-50 cursor-not-allowed' : `border-${mode === 'password' ? 'spc-navy' : 'spc-cyan'} text-${mode === 'password' ? 'spc-navy' : 'spc-cyan'} bg-white hover:bg-gray-50 shadow-sm`}`}
                                >
                                    <span className="mr-1">次へ</span> <IconChevronRight />
                                </button>
                            </div>
                        )}
                    </header>

                    {/* リスト表示領域 */}
                    {displayItems.length === 0 ? (
                        <div className="glass-panel rounded-2xl p-10 text-center text-gray-500">
                            {searchTerm ? '検索に一致する項目がありません。' : `${mode === 'password' ? 'パスワード' : 'アプリ'}が登録されていません。右下の「＋」ボタンから追加してください。`}
                        </div>
                    ) : (
                        <div>
                            {canSort && displayItems.length > 1 && (
                                <div className="text-right text-xs text-gray-500 mb-3 flex justify-end items-center animate-fade-in">
                                    <IconGripVertical />
                                    <span className="ml-1">カードをドラッグして並び替えできます</span>
                                </div>
                            )}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {/* displayItems ではなく paginatedItems（30件）を展開する */}
                                {paginatedItems.map((item, index) => (
                                    mode === 'password' ? (
                                        <PasswordCard 
                                            key={`${item.id}-${resetTrigger}`} 
                                            item={item} 
                                            onEdit={() => openEditModal(item)}
                                            onDelete={() => handleDelete(item.id, 'password')}
                                            showToast={showToast}
                                            canSort={canSort}
                                            dragProps={canSort ? createDragProps(index) : {}}
                                        />
                                    ) : (
                                        <AppCard 
                                            key={`${item.id}-${resetTrigger}`} 
                                            item={item} 
                                            onEdit={() => openEditModal(item)}
                                            onDelete={() => handleDelete(item.id, 'app')}
                                            showToast={showToast}
                                            canSort={canSort}
                                            dragProps={canSort ? createDragProps(index) : {}}
                                        />
                                    )
                                ))}
                            </div>
                        </div>
                    )}

                    {/* FAB (Floating Action Button) */}
                    <button
                        onClick={openAddModal}
                        className={`fixed bottom-8 right-8 w-16 h-16 text-white rounded-full flex items-center justify-center shadow-lg transition-transform transform hover:scale-105 z-40 focus:outline-none focus:ring-4 ${mode === 'password' ? 'bg-spc-navy hover:bg-blue-900 focus:ring-blue-300' : 'bg-spc-cyan hover:bg-spc-cyan focus:ring-cyan-300'}`}
                        title="新規追加"
                    >
                        <IconPlus />
                    </button>

                    {/* 追加・編集モーダル (パスワード) */}
                    {isPasswordModalOpen && (
                        <PasswordFormModal 
                            item={editingItem} 
                            onClose={() => setIsPasswordModalOpen(false)} 
                            onSave={handleSavePassword} 
                        />
                    )}

                    {/* 追加・編集モーダル (アプリ) */}
                    {isAppModalOpen && (
                        <AppFormModal 
                            item={editingItem} 
                            onClose={() => setIsAppModalOpen(false)} 
                            onSave={handleSaveApp} 
                        />
                    )}

                    {/* トースト通知 */}
                    {toastMessage && (
                        <div className={`fixed bottom-8 left-1/2 transform -translate-x-1/2 text-white px-6 py-3 rounded-full shadow-xl z-50 flex items-center transition-opacity duration-300 ${mode === 'password' ? 'bg-spc-navy' : 'bg-spc-cyan'}`}>
                            <span className="mr-2"><IconCheck /></span>
                            {toastMessage}
                        </div>
                    )}

                    {/* 共通ダイアログ */}
                    {dialog.isOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-[60] p-4 animate-fade-in">
                            <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full overflow-hidden">
                                <div className="p-6">
                                    <p className="text-gray-800 whitespace-pre-wrap leading-relaxed">{dialog.message}</p>
                                </div>
                                <div className="bg-gray-50 px-6 py-4 flex justify-end space-x-3 rounded-b-xl border-t border-gray-100">
                                    {dialog.type === 'confirm' && (
                                        <button 
                                            onClick={() => setDialog({ isOpen: false, type: 'alert', message: '', onConfirm: null })} 
                                            className="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 text-sm font-medium focus:outline-none transition-colors"
                                        >
                                            キャンセル
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => {
                                            if (dialog.onConfirm) dialog.onConfirm();
                                            setDialog({ isOpen: false, type: 'alert', message: '', onConfirm: null });
                                        }} 
                                        className={`px-4 py-2 text-white rounded-lg text-sm font-medium shadow-sm focus:outline-none transition-colors ${mode === 'password' ? 'bg-spc-navy hover:bg-blue-900' : 'bg-spc-cyan hover:bg-cyan-600'}`}
                                    >
                                        OK
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- パスワード表示カードコンポーネント ---
        const PasswordCard = ({ item, onEdit, onDelete, showToast, canSort = false, dragProps = {} }) => {
            const [showPassword, setShowPassword] = useState(false);
            const [copiedField, setCopiedField] = useState(null);
            const [isExpanded, setIsExpanded] = useState(false);

            const handleCopy = (text, fieldName) => {
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedField(fieldName);
                    setTimeout(() => setCopiedField(null), 2000);
                    showToast(`${fieldName === 'id' ? 'ID' : 'パスワード'}をコピーしました`);
                }).catch(() => showToast('コピーに失敗しました'));
            };

            const categoryInfo = PASSWORD_CATEGORIES.find(c => c.id === item.category) || PASSWORD_CATEGORIES[4];
            
            // 展開されていない時のみドラッグ可能にする
            const isDraggable = canSort && !isExpanded;

            return (
                <div 
                    className={`glass-panel rounded-xl relative group transition-all duration-300 ${dragProps.isDragging ? 'opacity-40 scale-[0.98]' : 'hover:shadow-xl hover:border-spc-navy/50'}`}
                    draggable={isDraggable}
                    onDragStart={isDraggable ? dragProps.onDragStart : undefined}
                    onDragEnter={isDraggable ? dragProps.onDragEnter : undefined}
                    onDragOver={isDraggable ? dragProps.onDragOver : undefined}
                    onDragEnd={isDraggable ? dragProps.onDragEnd : undefined}
                    onDrop={isDraggable ? dragProps.onDrop : undefined}
                >
                    {/* ドロップ位置のインジケーター */}
                    {dragProps.isDragOver && (
                        <div className="absolute -top-1 left-0 right-0 h-1.5 bg-spc-cyan rounded-full z-10 pointer-events-none"></div>
                    )}

                    <div className={`absolute top-0 left-0 w-full h-1 ${
                        item.category === 'subscription' ? 'bg-yellow-400' : 
                        item.category === 'business' ? 'bg-spc-navy' : 
                        item.category === 'private' ? 'bg-green-400' : 'bg-gray-400'
                    }`}></div>

                    <div 
                        className={`p-5 flex justify-between items-center select-none ${isDraggable ? 'cursor-grab active:cursor-grabbing' : 'cursor-pointer'}`}
                        onClick={() => setIsExpanded(!isExpanded)}
                    >
                        {canSort && (
                            <div className={`mr-3 ${isDraggable ? 'text-gray-400' : 'text-gray-200'}`} title={isDraggable ? "ドラッグして並び替え" : ""}>
                                <IconGripVertical />
                            </div>
                        )}
                        <div className="flex-1 pr-4">
                            <span className="text-xs font-semibold text-gray-500 bg-gray-100 px-2 py-1 rounded-md mb-2 inline-block">
                                {categoryInfo.label}
                            </span>
                            <h3 className="text-lg font-bold text-gray-800 leading-tight">
                                {item.title}
                            </h3>
                        </div>
                        <div className="flex items-center">
                            <div className="hidden sm:flex space-x-1 opacity-0 group-hover:opacity-100 transition-opacity mr-3" onClick={e => e.stopPropagation()}>
                                <button onClick={onEdit} className="p-1.5 text-gray-500 hover:text-spc-navy hover:bg-blue-50 rounded-md" title="編集"><IconEdit /></button>
                                <button onClick={onDelete} className="p-1.5 text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-md" title="削除"><IconTrash /></button>
                            </div>
                            <div className={`text-gray-400 transition-transform duration-300 ${isExpanded ? 'transform rotate-180' : ''}`}>
                                <IconChevronDown />
                            </div>
                        </div>
                    </div>

                    {isExpanded && (
                        <div className="px-5 pb-5 border-t border-gray-100/50 pt-4 animate-fade-in bg-white/30">
                            <div className="flex justify-end space-x-2 mb-4 sm:hidden">
                                <button onClick={onEdit} className="flex items-center text-xs px-3 py-1.5 text-spc-navy bg-blue-50 rounded-md shadow-sm"><IconEdit /><span className="ml-1">編集</span></button>
                                <button onClick={onDelete} className="flex items-center text-xs px-3 py-1.5 text-red-600 bg-red-50 rounded-md shadow-sm"><IconTrash /><span className="ml-1">削除</span></button>
                            </div>

                            {item.url && (
                                <div className="mb-4">
                                    <a href={item.url.startsWith('http') ? item.url : `https://${item.url}`} target="_blank" rel="noopener noreferrer" className="flex items-center text-sm text-spc-navy hover:text-blue-800 bg-white px-3 py-2.5 rounded-lg border border-blue-100 shadow-sm transition-colors break-all">
                                        <IconExternalLink />
                                        <span className="ml-2 font-medium">サイトを開く: {item.url}</span>
                                    </a>
                                </div>
                            )}

                            <div className="space-y-3 bg-white p-4 rounded-lg border border-gray-100 shadow-sm">
                                <div className="flex items-center justify-between">
                                    <div className="overflow-hidden w-full pr-2">
                                        <div className="text-xs text-gray-500 mb-0.5">ID / Email</div>
                                        <div className="font-mono text-sm text-gray-800 truncate">{item.username || '-'}</div>
                                    </div>
                                    <button 
                                        onClick={() => handleCopy(item.username, 'id')}
                                        disabled={!item.username}
                                        className={`p-2 rounded-md transition-colors ${copiedField === 'id' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'} ${!item.username && 'opacity-30 cursor-not-allowed'}`}
                                    >
                                        {copiedField === 'id' ? <IconCheck /> : <IconCopy />}
                                    </button>
                                </div>

                                <div className="flex items-center justify-between border-t border-gray-100 pt-3">
                                    <div className="overflow-hidden w-full pr-2">
                                        <div className="text-xs text-gray-500 mb-0.5 flex items-center">
                                            Password
                                            <button onClick={() => setShowPassword(!showPassword)} className="ml-2 text-gray-400 hover:text-gray-600 focus:outline-none">
                                                {showPassword ? <IconEyeOff /> : <IconEye />}
                                            </button>
                                        </div>
                                        <div className="font-mono text-sm text-gray-800 truncate">
                                            {item.password ? (showPassword ? item.password : '••••••••••••') : '-'}
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => handleCopy(item.password, 'password')}
                                        disabled={!item.password}
                                        className={`p-2 rounded-md transition-colors ${copiedField === 'password' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'} ${!item.password && 'opacity-30 cursor-not-allowed'}`}
                                    >
                                        {copiedField === 'password' ? <IconCheck /> : <IconCopy />}
                                    </button>
                                </div>
                            </div>

                            {item.memo && (
                                <div className="mt-4 text-sm text-gray-700 bg-yellow-50 p-3.5 rounded-lg border border-yellow-200 shadow-sm whitespace-pre-wrap leading-relaxed">
                                    <div className="text-xs font-bold text-yellow-600 mb-1 flex items-center">詳細メモ・料金など</div>
                                    {item.memo}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- アプリ表示カードコンポーネント ---
        const AppCard = ({ item, onEdit, onDelete, showToast, canSort = false, dragProps = {} }) => {
            const [copiedField, setCopiedField] = useState(null);
            const [isExpanded, setIsExpanded] = useState(false);
            const [showAppPassword, setShowAppPassword] = useState(false); // パスワード表示用ステート

            const handleCopy = (text, fieldName) => {
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedField(fieldName);
                    setTimeout(() => setCopiedField(null), 2000);
                    showToast(`コピーしました`);
                }).catch(() => showToast('コピーに失敗しました'));
            };

            let categoryInfo = APP_CATEGORIES.find(c => c.id === item.category);
            
            // 互換性対応: 過去に「アーカイブ」で登録していたデータが消えて見えなくならないようにする安全装置
            if (!categoryInfo && item.category === 'archive') {
                categoryInfo = { id: 'archive', label: '📦 アーカイブ' };
            } else if (!categoryInfo) {
                categoryInfo = APP_CATEGORIES[0]; // フォールバック
            }

            // 有料/無料のバッジ情報
            const priceTypeInfo = item.priceType === 'paid' 
                ? { label: '💎 有料', color: 'bg-blue-50 text-blue-700 border-blue-200' } 
                : { label: '🆓 無料', color: 'bg-green-50 text-green-700 border-green-200' };

            // 種類（仕事/PB）のバッジ情報（過去データで未設定の場合は仕事扱い）
            const appTypeInfo = item.appType === 'private'
                ? { label: '⛳️ PB', color: 'bg-orange-50 text-orange-700 border-orange-200' }
                : { label: '💼 仕事', color: 'bg-indigo-50 text-indigo-700 border-indigo-200' };

            // 展開されていない時のみドラッグ可能にする
            const isDraggable = canSort && !isExpanded;

            return (
                <div 
                    className={`glass-panel rounded-xl relative group transition-all duration-300 ${dragProps.isDragging ? 'opacity-40 scale-[0.98]' : 'hover:shadow-xl hover:border-spc-cyan/50'}`}
                    draggable={isDraggable}
                    onDragStart={isDraggable ? dragProps.onDragStart : undefined}
                    onDragEnter={isDraggable ? dragProps.onDragEnter : undefined}
                    onDragOver={isDraggable ? dragProps.onDragOver : undefined}
                    onDragEnd={isDraggable ? dragProps.onDragEnd : undefined}
                    onDrop={isDraggable ? dragProps.onDrop : undefined}
                >
                    {/* ドロップ位置のインジケーター */}
                    {dragProps.isDragOver && (
                        <div className="absolute -top-1 left-0 right-0 h-1.5 bg-spc-cyan rounded-full z-10 pointer-events-none"></div>
                    )}

        // --- アプリ管理用フォームモーダル ---
        const AppFormModal = ({ item, onClose, onSave }) => {
            const defaultSocialPosts = {
                note: { date: '', posted: false, url: '' },
                base: { date: '', posted: false, url: '' },
                threads: { date: '', posted: false },
                x: { date: '', posted: false },
                facebook: { date: '', posted: false },
                instagram: { date: '', posted: false }

            const [formData, setFormData] = useState({
                title: '', category: 'active', 
                priceType: 'free', 
                appType: 'work', 
                localHtml: '', githubUrl: '', workersUrl: '', apiInfo: '', 
                stripeUrl: '', 
                stripeThanksUrl: '', // 新規追加
                monthlyPrice: '', buyoutPrice: '', 
                appPassword: '', 
                memo: '',
                thumbnail: '', 
                socialPosts: defaultSocialPosts
            });
            const [errorMsg, setErrorMsg] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => { 
                if (item) {
                    // 過去データと安全にマージする処理
                    const mergedSocialPosts = { ...defaultSocialPosts };
                    if (item.socialPosts) {
                        Object.keys(defaultSocialPosts).forEach(key => {
                            if (item.socialPosts[key]) {
                                mergedSocialPosts[key] = { ...defaultSocialPosts[key], ...item.socialPosts[key] };
                            }
                        });
                    }

                    setFormData({
                        ...item,
                        priceType: item.priceType || 'free', 
                        appType: item.appType || 'work',
                        appPassword: item.appPassword || '', 
                        stripeThanksUrl: item.stripeThanksUrl || '', // 新規追加：既存のデータに対応
                        thumbnail: item.thumbnail || '', 
                        socialPosts: mergedSocialPosts
                    });
                } 
            }, [item]);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                setErrorMsg('');
            };

            // 画像の読み込みと圧縮処理（LocalStorageの容量節約のため）
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 最初のファイルサイズチェック（5MB以上は弾く）
                if (file.size > 5 * 1024 * 1024) {
                    setErrorMsg('画像サイズは5MB以下にしてください。');
                    if (fileInputRef.current) fileInputRef.current.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_WIDTH = 600; // 横幅を最大600pxに圧縮

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // JPEG形式で少し品質を落としてデータ化
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        
                        // 変換後のデータサイズチェック（約500KB制限）
                        if (dataUrl.length > 500000) {
                            setErrorMsg('圧縮後も画像が大きすぎます。別の画像を選択してください。');
                            if (fileInputRef.current) fileInputRef.current.value = '';
                            return;
                        }

                        setFormData(prev => ({ ...prev, thumbnail: dataUrl }));
                        setErrorMsg('');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // 選択した画像を削除する関数
            const removeImage = () => {
                setFormData(prev => ({ ...prev, thumbnail: '' }));
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            // SNS専用のチェンジハンドラ
            const handleSocialChange = (platform, field, value) => {
                setFormData(prev => ({
                    ...prev,
                    socialPosts: {
                        ...prev.socialPosts,
                        [platform]: {
                            ...prev.socialPosts[platform],
                            [field]: value
                        }
                    }
                }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.title.trim()) {
                    setErrorMsg('アプリ名は必須です。');
                    return;
                }
                onSave(formData);
            };

            const platformNames = { note: 'note', base: 'base', threads: 'Threads', x: 'X', facebook: 'Facebook', instagram: 'Instagram' };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-50 p-4 animate-fade-in">

                        </div>

                                    <label className="block text-sm font-medium text-gray-700 mb-1">アプリ名 <span className="text-red-500">*</span></label>
                                    <input type="text" name="title" required className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-spc-cyan outline-none" placeholder="例: 価値みっけ v2" value={formData.title} onChange={handleChange} />
                                </div>

                                    <label className="block text-sm font-medium text-gray-700 mb-1">ステータス</label>

                                        {APP_CATEGORIES.filter(c => c.id !== 'all').map(cat => <option key={cat.id} value={cat.id}>{cat.label}</option>)}
                                    </select>
                                </div>
                            </div>

                            {/* --- 提供形態と種類の選択 --- */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">提供形態</label>
                                    <div className="flex space-x-4">
                                        <label className="flex items-center cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="priceType" 
                                                value="free" 
                                                checked={formData.priceType === 'free'} 
                                                onChange={handleChange} 
                                                className="text-spc-cyan focus:ring-spc-cyan h-4 w-4" 
                                            />
                                            <span className="ml-1.5 text-sm text-gray-700 font-medium">🆓 無料</span>
                                        </label>
                                        <label className="flex items-center cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="priceType" 
                                                value="paid"

                                                onChange={handleChange} 
                                                className="text-spc-cyan focus:ring-spc-cyan h-4 w-4" 
                                            />
                                            <span className="ml-1.5 text-sm text-gray-700 font-medium">💎 有料</span>
                                        </label>
                                    </div>
                                </div>

                                <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">種類</label>
                                    <div className="flex space-x-4">
                                        <label className="flex items-center cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="appType" 
                                                value="work" 
                                                checked={formData.appType === 'work'} 
                                                onChange={handleChange} 
                                                className="text-spc-cyan focus:ring-spc-cyan h-4 w-4" 
                                            />
                                            <span className="ml-1.5 text-sm text-gray-700 font-medium">💼 仕事</span>
                                        </label>
                                        <label className="flex items-center cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="appType" 
                                                value="private" 
                                                checked={formData.appType === 'private'} 
                                                onChange={handleChange} 
                                                className="text-spc-cyan focus:ring-spc-cyan h-4 w-4" 
                                            />
                                            <span className="ml-1.5 text-sm text-gray-700 font-medium">⛳️ PB</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">📂 ローカルHTMLパス</label>
                                <input type="text" name="localHtml" className="w-full border border-gray-300 rounded-lg px-4 py-2 font-mono text-sm outline-none" placeholder="C:\Users\...\index.html" value={formData.localHtml} onChange={handleChange} />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">🐙 GitHub URL</label>
                                <input type="url" name="githubUrl" className="w-full border border-gray-300 rounded-lg px-4 py-2 font-mono text-sm outline-none" placeholder="https://github.com/..." value={formData.githubUrl} onChange={handleChange} />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">⚡ Cloudflare Workers URL</label>
                                <input type="url" name="workersUrl" className="w-full border border-gray-300 rounded-lg px-4 py-2 font-mono text-sm outline-none" placeholder="https://...workers.dev" value={formData.workersUrl} onChange={handleChange} />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">🔑 APIキー・環境変数</label>
                                <textarea name="apiInfo" rows="2" className="w-full border border-gray-300 rounded-lg px-4 py-2 font-mono text-sm outline-none bg-gray-50" placeholder="OPENAI_API_KEY=sk-..." value={formData.apiInfo} onChange={handleChange}></textarea>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">💳 Stripe 販売URL</label>
                                <input type="url" name="stripeUrl" className="w-full border border-gray-300 rounded-lg px-4 py-2 font-mono text-sm outline-none" placeholder="https://dashboard.stripe.com/..." value={formData.stripeUrl || ''} onChange={handleChange} />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">🎉 Stripe ありがとうURL</label>
                                <input type="url" name="stripeThanksUrl" className="w-full border border-gray-300 rounded-lg px-4 py-2 font-mono text-sm outline-none" placeholder="https://..." value={formData.stripeThanksUrl || ''} onChange={handleChange} />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">💴 月額価格</label>
                                    <input type="text" name="monthlyPrice" className="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm outline-none" placeholder="例: 1,000円" value={formData.monthlyPrice || ''} onChange={handleChange} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">💰 買取価格</label>
                                    <input type="text" name="buyoutPrice" className="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm outline-none" placeholder="例: 10,000円" value={formData.buyoutPrice || ''} onChange={handleChange} />
                                </div>
                            </div>

                            {/* --- アプリ用パスワード入力欄 --- */}
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">🔒 アプリ用パスワード</label>
                                <input 
                                    type="text" 
                                    name="appPassword" 
                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 font-mono text-sm outline-none" 
                                    placeholder="••••••••" 
                                    value={formData.appPassword || ''} 
                                    onChange={handleChange} 
                                    autoComplete="new-password"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">📝 開発メモ・概要</label>
                                <textarea name="memo" rows="2" className="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm outline-none" placeholder="使用しているライブラリや次のタスクなど" value={formData.memo} onChange={handleChange}></textarea>
                            </div>

                            {/* --- サムネイル画像 --- */}
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1 flex justify-between items-center">
                                    <span>🖼️ サムネイル画像</span>
                                    <span className="text-[10px] text-gray-500">※ブラウザ保存容量節約のため自動圧縮されます</span>
                                </label>
                                <div className="border border-gray-300 rounded-lg p-3 bg-gray-50 flex flex-col items-center justify-center">
                                    {formData.thumbnail ? (
                                        <div className="relative w-full text-center">
                                            <img src={formData.thumbnail} alt="プレビュー" className="max-h-40 mx-auto rounded border border-gray-200 shadow-sm" />
                                            <button 
                                                type="button" 
                                                onClick={removeImage}
                                                className="mt-2 text-xs text-red-600 bg-white px-3 py-1 rounded hover:bg-red-50 border border-red-200 transition-colors shadow-sm"
                                            >
                                                画像を削除
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="w-full">
                                            <input 
                                                type="file" 
                                                accept="image/*" 
                                                ref={fileInputRef}
                                                onChange={handleImageChange}
                                                className="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-50 file:text-spc-cyan hover:file:bg-cyan-100 outline-none cursor-pointer" 
                                            />
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* --- SNS投稿管理 --- */}
                            <div className="pt-2">
                                <label className="block text-sm font-medium text-gray-700 mb-2">📢 SNS連携・投稿状況</label>
                                <div className="space-y-3 bg-gray-50 p-4 rounded-lg border border-gray-200">
                                    {Object.keys(platformNames).map(platform => {
                                        const postData = formData.socialPosts[platform] || { date: '', posted: false, url: '' };
                                        return (
                                            <div key={platform} className="flex flex-col border-b border-gray-200 pb-3 mb-3 last:border-0 last:pb-0 last:mb-0">
                                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                                                    <div className="w-24 text-sm font-bold text-gray-700">{platformNames[platform]}</div>
                                                    <div className="flex items-center space-x-4">
                                                        <input 
                                                            type="date" 
                                                            className="border border-gray-300 rounded px-2 py-1.5 text-sm outline-none focus:ring-1 focus:ring-spc-cyan text-gray-600 w-[130px]"
                                                            value={postData.date}
                                                            onChange={(e) => handleSocialChange(platform, 'date', e.target.value)}
                                                        />
                                                        <label className="flex items-center space-x-1.5 cursor-pointer min-w-[80px]">
                                                            <input 
                                                                type="checkbox" 
                                                                className="rounded text-spc-cyan focus:ring-spc-cyan w-4 h-4"
                                                                checked={postData.posted}
                                                                onChange={(e) => handleSocialChange(platform, 'posted', e.target.checked)}
                                                            />
                                                            <span className="text-sm text-gray-600 font-medium">投稿済み</span>
                                                        </label>
                                                    </div>
                                                </div>
                                                {/* note と base のみ URL入力欄を表示 */}
                                                {(platform === 'note' || platform === 'base') && (
                                                    <div className="mt-2 pl-0 sm:pl-[112px]">
                                                        <input 
                                                            type="url" 
                                                            className="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-spc-cyan"
                                                            placeholder={`${platformNames[platform]}の投稿URL`}
                                                            value={postData.url || ''}
                                                            onChange={(e) => handleSocialChange(platform, 'url', e.target.value)}
                                                        />
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="pt-4 mt-2 border-t border-gray-100 flex justify-end space-x-3">
                                <button type="button" onClick={onClose} className="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium">キャンセル</button>
                                <button type="submit" className="px-5 py-2.5 bg-spc-cyan text-white rounded-lg hover:bg-cyan-600 font-medium shadow-md">{item ? '更新して保存' : '登録する'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
